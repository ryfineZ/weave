version: v2

plugins:
  # Go types (protoc-gen-go)
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative

  # connect-go service stubs
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative

  # TypeScript types (@bufbuild/protoc-gen-es)
  - remote: buf.build/bufbuild/es
    out: gen/ts
    opt:
      - target=ts

  # connect-web client stubs (@connectrpc/protoc-gen-connect-es)
  - remote: buf.build/connectrpc/es
    out: gen/ts
    opt:
      - target=ts

inputs:
  - directory: proto
